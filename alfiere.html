<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Tutorial Scacchi: Alfiere e Pedoni</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* SFONDO E LAYOUT BASE */
        body {
            background-color: black;
            /* Sfondo nero come richiesto */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            /* Contenuto a sinistra */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* HEADER TITOLO (Tabella semitrasparente) */
        .header-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* MAIN CONTENT WRAPPER */
        .main-wrapper {
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* LA SCACCHIERA */
        .chess-container {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            grid-template-rows: repeat(8, 40px);
            border: 3px solid #333;
            user-select: none;
            background-color: white;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
        }

        .t {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            width: 40px;
            height: 40px;
            position: relative;
            cursor: pointer;
        }

        /* Colori Caselle */
        .w {
            background-color: #d3d3d3;
        }

        .b {
            background-color: #000000;
        }

        /* ISTRUZIONI */
        .istruzioni-box {
            padding: 20px;
            background-color: white;
            color: #333;
            border-left: 5px solid #FFD700;
            width: 320px;
            border-radius: 4px;
        }

        /* MENU E ICONA */
        .menu {
            display: none;
            position: fixed;
            top: 60px;
            right: 20px;
            background: white;
            color: black;
            border: 1px solid #ccc;
            padding: 10px;
            z-index: 1000;
        }

        .menu a {
            display: block;
            padding: 5px;
            text-decoration: none;
            color: black;
        }

        /* LOGICA MOVIMENTO (Pallini e Selezione) */
        .selected {
            background-color: #f7f769 !important;
        }

        .attivo {
            color: #FFD700 !important;
            text-shadow: 1px 1px 2px black;
        }

        .path::after {
            content: "";
            width: 12px;
            height: 12px;
            background-color: rgba(255, 0, 0, 0.7);
            border-radius: 50%;
            position: absolute;
            z-index: 1;
        }

        .t a {
            text-decoration: none;
            color: inherit;
            z-index: 5;
        }
    </style>
</head>

    <script>
        function toggleMenu() {
            var menu = document.getElementById("menu");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
        }

        document.addEventListener('DOMContentLoaded', () => {
            const tiles = document.querySelectorAll('.t');
            let selected = null;

            tiles.forEach((tile, index) => {
                tile.addEventListener('click', () => {
                    const piece = tile.innerText.trim();
                    if (tile.classList.contains('path')) {
                        movePiece(tile);
                        return;
                    }
                    resetBoard();
                    if (['♗', '♝', '♙', '♟'].includes(piece)) {
                        selected = { el: tile, idx: index, type: piece };
                        tile.classList.add('selected');
                        tile.classList.add('attivo');
                        if (piece === '♗' || piece === '♝') showBishopMoves(index);
                        if (piece === '♙') showPawnMoves(index, -1);
                        if (piece === '♟') showPawnMoves(index, 1);
                    }
                });
            });

            function showBishopMoves(idx) {
                const r = Math.floor(idx / 8), c = idx % 8;
                const dirs = [[1, 1], [1, -1], [-1, 1], [-1, -1]];
                dirs.forEach(d => {
                    let nr = r + d[0], nc = c + d[1];
                    while (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                        const t = tiles[nr * 8 + nc];
                        if (t.innerText.trim() !== "") break;
                        t.classList.add('path');
                        nr += d[0]; nc += d[1];
                    }
                });
            }

            function showPawnMoves(idx, dir) {
                const r = Math.floor(idx / 8), c = idx % 8;
                let nr = r + dir;
                if (nr >= 0 && nr < 8 && tiles[nr * 8 + c].innerText.trim() === "") {
                    tiles[nr * 8 + c].classList.add('path');
                    if ((dir === -1 && r === 6) || (dir === 1 && r === 1)) {
                        let nr2 = r + (dir * 2);
                        if (tiles[nr2 * 8 + c].innerText.trim() === "") tiles[nr2 * 8 + c].classList.add('path');
                    }
                }
            }

            function movePiece(target) {
                target.innerHTML = selected.el.innerHTML;
                selected.el.innerHTML = "";
                resetBoard();
            }

            function resetBoard() {
                tiles.forEach(t => t.classList.remove('selected', 'path', 'attivo'));
                selected = null;
            }
        });
    </script>
