<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Scacchi: come si gioca?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/736x/a4/bc/bf/a4bcbfd99f9a6b7495db199a24871999.jpg">
    <style>
        /* SFONDO E LAYOUT BASE */
        body {
            background-color: black;
            /* Sfondo nero*/
            color: white;
            /*testo pagina bianco*/
            display: flex;
            /*serve per l'allineamento*/
            flex-direction: column;
            /*mette gli elementi in verticale*/
            align-items: flex-start;
            /* Contenuto a sinistra */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* HEADER TITOLO (Tabella semitrasparente) */
        .header-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* MAIN CONTENT WRAPPER */
        .main-wrapper {
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* MENU ALFIERE - STILE INDEX IDENTICO */
        .bishop-trigger {
            font-size: 45px;
            color: #FFD700;
            cursor: pointer;
            position: fixed;
            top: 15px;
            right: 25px;
            z-index: 1001;
            transition: 0.4s;
        }

        .bishop-trigger:hover {
            transform: rotate(25deg) scale(1.2);
            color: #fff;
            text-shadow: 0 0 25px #FFD700;
        }

        .menu {
            display: none;
            position: fixed;
            top: 75px;
            right: 25px;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid #FFD700;
            width: 200px;
            z-index: 1000;
        }

        .menu.show {
            display: block;
        }

        .menu a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 15px;
            border-bottom: 1px solid #222;
            font-weight: bold;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #FFD700;
            color: #000;
            padding-left: 25px;
        }
    </style>
</head>

<body>

    <div class="header-container">
        <table bgcolor="#FFFFFF" width="90%" border="0" cellpadding="0" cellspacing="0"
            style="opacity:0.7; margin-top:20px; max-width:1500px;">
            <tr>
                <td align="center" valign="middle" style="padding: 20px;">
                    <font face="Fantasy" color="#000000" size="7">COME SI GIOCA</font>
                </td>
            </tr>
        </table>
    </div>

     <div class="bishop-trigger" onclick="toggleMenu()">♗</div>
        <div id="menu" class="menu">
            <a href="storia.html">♙ La Storia</a>
            <a href="come_giocare.html">♙ Come si gioca</a>
            <a href="pagina3.html">♙ Pagina 3</a>
            <a href="pagina4.html">♙ Pagina 4</a>
        </div>


        <script>
            // Funzione per aprire/chiudere il menu
           function toggleMenu() { document.getElementById("menu").classList.toggle("show"); }
        </script>

    </div>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/9WYTmBDFQfI"
        title="Come Giocare A Scacchi: Guida Completa Per Principianti" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
    </iframe>


</body>
